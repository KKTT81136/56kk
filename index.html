  <script>
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.addEventListener('keydown', function(e) {
      if(e.keyCode == 123) { e.preventDefault(); return false; }
      if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { e.preventDefault(); return false; } 
      if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { e.preventDefault(); return false; } 
      if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { e.preventDefault(); return false; } 
      if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { e.preventDefault(); return false; } 
    });
  </script>

  <!-- สคริปต์ประมวลผลทันทีเพื่อป้องกันสี/ภาพพื้นหลังกระพริบและกระตุกช่วงเริ่มต้นโหลดหน้า -->
  <script>
    (function() {
      var cached = localStorage.getItem('tos_cached_config');
      var primary = '#FFFFFF'; 
      var secondary = '#4f46e5';
      var title = 'Shopping';
      var themeType = 'gradient';
      var marqueeBg = '#eb2f96';
      var loginBg = '';
      var loginBgMobile = '';
      var userBg = '';
      var userBgMobile = '';
      var loaderBg = '#f8fafc';

      if (cached) {
        try {
          var cfg = JSON.parse(cached);
          primary = cfg.themePrimary || primary;
          secondary = cfg.themeSecondary || secondary;
          title = cfg.tabTitle || title;
          themeType = cfg.themeType || themeType;
          marqueeBg = cfg.themeMarqueeBg || marqueeBg;
          loginBg = cfg.loginBgUrl || '';
          loginBgMobile = cfg.loginBgUrlMobile || '';
          userBg = cfg.userBgUrl || '';
          userBgMobile = cfg.userBgUrlMobile || '';
        } catch(e) {}
      }

      document.title = title;

      var bgStyle = (themeType === 'single') 
        ? "background: " + primary + " !important;" 
        : "background: linear-gradient(135deg, " + primary + ", " + secondary + ") !important;";

      var cssRules = [
        ":root {",
        "  --color-primary: " + primary + ";",
        "  --color-secondary: " + secondary + ";",
        "  --color-marquee-bg: " + marqueeBg + ";",
        "}",
        "body { background-color: " + loaderBg + " !important; }",
        ".text-primary { color: " + primary + " !important; }",
        ".bg-primary { background-color: " + primary + " !important; }",
        ".border-primary { border-color: " + primary + " !important; }",
        ".bg-theme-gradient { " + bgStyle + " }",
        ".fill-blue-100\\/50 { fill: " + primary + "33 !important; }"
      ];

      if (loginBg) {
        cssRules.push("#form-card-wrapper { background-image: url('" + loginBg + "') !important; background-size: cover !important; background-position: center !important; background-repeat: no-repeat !important; }");
      }
      if (loginBgMobile) {
        cssRules.push("@media (max-width: 767px) { #form-card-wrapper { background-image: url('" + loginBgMobile + "') !important; background-size: cover !important; background-position: center !important; background-repeat: no-repeat !important; } }");
      }

      if (userBg) {
        cssRules.push("#dash-outer-container { background-image: url('" + userBg + "') !important; background-size: cover !important; background-position: center !important; background-repeat: no-repeat !important; }");
      } else {
        cssRules.push("#dash-outer-container { background-color: " + loaderBg + " !important; }");
      }
      if (userBgMobile) {
        cssRules.push("@media (max-width: 767px) { #dash-outer-container { background-image: url('" + userBgMobile + "') !important; background-size: cover !important; background-position: center !important; background-repeat: no-repeat !important; } }");
      }

      var styleEl = document.createElement('style');
      styleEl.id = 'dynamic-theme-style';
      styleEl.innerHTML = cssRules.join("\n");
      document.head.appendChild(styleEl);
    })();
  </script>

  <style>
    * { 
      font-family: 'Inter', 'Noto Sans Thai', sans-serif; 
      -webkit-font-smoothing: antialiased; 
      user-select: none; 
      -webkit-user-select: none; 
      box-sizing: border-box;
      font-weight: 300;
    }
    b, strong, h1, h2, h3, h4, th, .font-bold, .font-black, .font-semibold {
      font-weight: 500 !important;
    }
    input, textarea, select { 
      user-select: auto; 
      -webkit-user-select: auto; 
      font-size: 16px !important; 
    }
    html, body { 
      min-height: 100%; 
      margin: 0; 
      touch-action: manipulation; 
      background-color: #f8fafc !important;
    }
    
    #dash-outer-container {
      background-color: #f8fafc !important;
    }

    .fade-in { 
      animation: fadeIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
    }
    @keyframes fadeIn { 
      from { opacity: 0; transform: translateY(5px); } 
      to { opacity: 1; transform: translateY(0); } 
    }
    
    @keyframes slideIn { 
      from { transform: scale(0.97) translateY(5px); opacity: 0; } 
      to { transform: scale(1) translateY(0); opacity: 1; } 
    }
    .modal-anim { 
      animation: slideIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
    }
    @keyframes toastSlide { 
      from { opacity: 0; transform: translate(-50%, -10px); } 
      to { opacity: 1; transform: translate(-50%, 0); } 
    }
    .toast-show { 
      animation: toastSlide 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
    }
    ::-webkit-scrollbar { 
      width: 6px; 
    }
    ::-webkit-scrollbar-track { 
      background: transparent; 
    }
    ::-webkit-scrollbar-thumb { 
      background: rgba(203, 213, 225, 0.8); 
      border-radius: 99px; 
    }
    .banner-slide { 
      transition: opacity 0.6s ease-in-out; 
    }
    
    .marquee-container { 
      overflow: hidden; 
      white-space: nowrap; 
      width: 100%; 
      display: flex;
      align-items: center; 
      position: relative; 
    }
    @keyframes marqueeScroll {
      0% { transform: translate3d(0, 0, 0); }
      100% { transform: translate3d(-100%, 0, 0); }
    }
    .marquee-text { 
      display: inline-block; 
      white-space: nowrap;
      padding-left: 100%; 
      animation: marqueeScroll 10s linear infinite;
      will-change: transform; 
    }
    
    .nav-glass { 
      background: rgba(255, 255, 255, 0.9); 
      backdrop-filter: blur(12px); 
      -webkit-backdrop-filter: blur(12px); 
    }

    .gallery-item {
      opacity: 1;
      transition: opacity 0.5s ease-in-out;
    }
    .gallery-item.reveal {
      opacity: 1;
    }

    .scroll-reveal-left {
      opacity: 0;
      transform: translateX(-20px);
      transition: opacity 1.2s ease, transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .scroll-reveal-right {
      opacity: 0;
      transform: translateX(20px);
      transition: opacity 1.2s ease, transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .scroll-reveal-active {
      opacity: 1 !important;
      transform: translateX(0) !important;
    }

    @keyframes slideFromLeft {
      0% {
        transform: translate3d(-50px, 0, 0);
        opacity: 0;
      }
      100% {
        transform: translate3d(0, 0, 0);
        opacity: 1;
      }
    }

    @keyframes slideFromRightNew {
      0% {
        transform: translate3d(50px, 0, 0);
        opacity: 0;
      }
      100% {
        transform: translate3d(0, 0, 0);
        opacity: 1;
      }
    }

    .showcase-card {
      opacity: 0;
      will-change: transform, opacity;
    }

    .revealed-slide .showcase-card-left {
      animation: slideFromLeft 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .revealed-slide .showcase-card-right {
      animation: slideFromRightNew 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .revealed-slide .showcase-card-left:nth-child(1) { animation-delay: 0.1s; }
    .revealed-slide .showcase-card-left:nth-child(2) { animation-delay: 0.3s; }
    .revealed-slide .showcase-card-left:nth-child(3) { animation-delay: 0.5s; }
    .revealed-slide .showcase-card-left:nth-child(4) { animation-delay: 0.7s; }

    .revealed-slide .showcase-card-right:nth-child(5) { animation-delay: 0.1s; }
    .revealed-slide .showcase-card-right:nth-child(6) { animation-delay: 0.3s; }
    .revealed-slide .showcase-card-right:nth-child(7) { animation-delay: 0.5s; }
    .revealed-slide .showcase-card-right:nth-child(8) { animation-delay: 0.7s; }
  </style>

    function isColorLight(hex) {
      if (!hex || hex.indexOf('#') !== 0) return false;
      const c = hex.substring(1);
      if (c.length !== 6) return false;
      const rgb = parseInt(c, 16);
      const r = (rgb >> 16) & 0xff;
      const g = (rgb >>  8) & 0xff;
      const b = (rgb >>  0) & 0xff;
      const luma = 0.2126 * r + 0.7152 * g + 0.0722 * b;
      return luma > 180; 
    }

    function normalizeProduct(p) {
      if (!p) return null;
      let rawPrice = p.productPrice !== undefined ? p.productPrice : p.price;
      let cleanedPrice = 0;
      if (typeof rawPrice === 'number') {
        cleanedPrice = rawPrice;
      } else if (typeof rawPrice === 'string') {
        cleanedPrice = parseFloat(rawPrice.replace(/[^0-9.]/g, '')) || 0;
      }
      return {
        id: p.id || p.__backendId || '',
        __backendId: p.__backendId || p.id || '',
        productName: p.productName || p.name || '',
        productPrice: cleanedPrice,
        commission: Number(p.commission) || 0,
        productImage: p.productImage || p.image || '',
        vipLevel: p.vipLevel !== undefined ? String(p.vipLevel) : '',
        isSpecial: p.isSpecial || false,
        type: p.type || 'product',
        status: p.status || '', 
        discount: p.discount || '',
        originalPrice: p.originalPrice || '',
        createdAt: p.createdAt || ''
      };
    }

    async function hashValue(string) {
      if (!string) return '';
      try {
        const utf8 = new TextEncoder().encode(string);
        const hashBuffer = await crypto.subtle.digest('SHA-256', utf8);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
      } catch (e) {
        return string;
      }
    }

      if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {

      }
      return Date.now().toString(36) + Math.random().toString(36).slice(2,8);
    }

          }).join('')}
        </div>`;
      }
      
      const marqueeText = getMarqueeText();
      const cfg = getConfig();
      const p = cfg.themePrimary || '#FFFFFF';
      const mBg = (cfg.themeMarqueeBg && cfg.themeMarqueeBg.trim() !== '') ? cfg.themeMarqueeBg : p;
      
      const isLightMarquee = isColorLight(mBg);
      const textColorClass = isLightMarquee ? 'text-slate-900' : 'text-white';
      const iconColorClass = isLightMarquee ? 'text-slate-950' : 'text-white';

      html += `
      <div style="background-color: ${mBg} !important;" class="flex items-center rounded-full pl-3.5 pr-5 py-2.5 shadow-sm mb-6 overflow-hidden relative">

          <div id="marquee-text-display" class="marquee-text text-sm font-semibold ${textColorClass} pt-0.5">${marqueeText}</div>

      </div>`;
      
      return html;
    }

    function startBannerSlide() {
      clearInterval(bannerInterval); 
      const slides = document.querySelectorAll('.banner-slide');
      if (slides.length > 1) { 
        slides.forEach((slide, i) => {
          slide.style.opacity = (i === 0) ? '1' : '0';
        });
        let idx = 0; 
        bannerInterval = setInterval(() => { 
          const activeSlides = document.querySelectorAll('.banner-slide'); 
          if(!activeSlides.length) {
            clearInterval(bannerInterval);
            return; 
          }
          if(activeSlides[idx]) activeSlides[idx].style.opacity = '0'; 
          idx = (idx + 1) % activeSlides.length; 
          if(activeSlides[idx]) activeSlides[idx].style.opacity = '1'; 
        }, 4000); 
      }
    }

    async function doLogin() {
      const phoneInput = $('inp-phone-login');
      const passInput = $('inp-pass-login');
      if (!phoneInput || !passInput) return;

      const phone = phoneInput.value.trim();
      const password = passInput.value.trim();

      if (!phone || !password) {
        showToast(t('fillAll'), 'error');
        return;
      }

      const btn = $('btn-login');
      if (btn) {
        btn.disabled = true;
        btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> ${t('processing')}`;
        safeCreateIcons();
      }

      try {
        const q = query(collection(db, "users"), where("phone", "==", phone));
        const snap = await getDocs(q);
        
        if (snap.empty) {
          showToast(t('userNotFound'), 'error');
          if (btn) {
            btn.disabled = false;
            btn.innerText = t('signIn');
            safeCreateIcons();
          }
          return;
        }

        let userDoc = null;
        snap.forEach(d => {
          userDoc = { ...d.data(), id: d.id };
        });

        const hashedEnteredPass = await hashValue(password);
        if (userDoc.password !== password && userDoc.password !== hashedEnteredPass) {
          showToast(t('invalidPass'), 'error');
          if (btn) {
            btn.disabled = false;
            btn.innerText = t('signIn');
            safeCreateIcons();
          }
          return;
        }

        showToast(t('loginSuccess'), 'success');
        localStorage.setItem('tos_logged_user_id', userDoc.id);
        currentUser = userDoc;
        currentTab = 'home';
        lastRenderedTab = ''; 
        sessionStorage.setItem('tos_current_tab', 'home');
        
        startUserSubscriptions(userDoc.id);
        renderDashboard();
      } catch (err) {
        showToast(t('connectionError') + err.message, 'error');
        if (btn) {
          btn.disabled = false;
          btn.innerText = t('signIn');
          safeCreateIcons();
        }
      }
    }

    async function doRegister() {
      const phoneInp = $('inp-phone-reg');
      const userInp = $('inp-user-reg');
      const passInp = $('inp-pass-reg');
      const passConfirmInp = $('inp-pass-confirm-reg');
      const pinInp = $('inp-pin-reg');
      const inviteInp = $('inp-invite-reg');

      if (!phoneInp || !userInp || !passInp || !passConfirmInp || !pinInp || !inviteInp) return;

      const phone = phoneInp.value.trim();
      const username = userInp.value.trim();
      const password = passInp.value.trim();
      const passConfirm = passConfirmInp.value.trim();
      const pin = pinInp.value.trim();
      const inviteCode = inviteInp.value.trim();

      if (!phone || !username || !password || !passConfirm || !pin || !inviteCode) {
        showToast(t('fillAll'), 'error');
        return;
      }

      if (!/^[0-9]{10}$/.test(phone)) {
        showToast('กรุณากรอกเบอร์โทรศัพท์ 10 หลักให้ถูกต้อง (เช่น 0812345678)', 'error');
        return;
      }

      if (password.length < 6) {
        showToast('รหัสผ่านต้องมีความยาวอย่างน้อย 6 ตัวอักษร', 'error');
        return;
      }

      if (password !== passConfirm) {
        showToast(t('passNotMatch'), 'error');
        return;
      }

      if (!/^[0-9]{6}$/.test(pin)) {
        showToast('รหัส PIN ถอนเงินต้องเป็นตัวเลข 6 หลักเท่านั้น', 'error');
        return;
      }

      const sysInvite = getInviteCode();
      if (sysInvite && inviteCode !== sysInvite) {
        showToast(t('invalidInvite'), 'error');
        return;
      }

      const btn = $('btn-reg');
      if (btn) {
        btn.disabled = true;
        btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> ${t('processing')}`;
        safeCreateIcons();
      }

      try {
        const q = query(collection(db, "users"), where("phone", "==", phone));
        const snap = await getDocs(q);
        if (!snap.empty) {
          showToast(t('phoneExists'), 'error');
          if (btn) {
            btn.disabled = false;
            btn.innerText = t('register');
            safeCreateIcons();
          }
          return;
        }

        const hashedPassword = await hashValue(password);
        const hashedPin = await hashValue(pin);

        const newUserId = genId();
        const newUserDoc = {
          id: newUserId,
          phone: phone,
          username: username,
          password: hashedPassword,
          withdrawPassword: hashedPin,
          credit: 0,
          userLevel: '', 
          runIndex: 0,
          creditScore: 100,
          bankName: '',
          bankNumber: '',
          firstName: '',
          lastName: '',
          createdAt: new Date().toISOString()
        };

        await setDoc(doc(db, "users", newUserId), newUserDoc);
        
        showToast(t('regSuccess'), 'success');
        localStorage.setItem('tos_logged_user_id', newUserId);
        currentUser = newUserDoc;
        currentTab = 'home';
        lastRenderedTab = ''; 
        sessionStorage.setItem('tos_current_tab', 'home');

        startUserSubscriptions(newUserId);
        renderDashboard();
      } catch (err) {
        showToast(t('regFailed') + ": " + err.message, 'error');
        if (btn) {
          btn.disabled = false;
          btn.innerText = t('register');
          safeCreateIcons();
        }
      }
    }

    function compressImage(base64Str, maxWidth = 500, maxHeight = 500) {
      return new Promise((resolve) => {
        const img = new Image();
        img.src = base64Str;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let width = img.width;
          let height = img.height;

          if (width > height) {
            if (width > maxWidth) {
              height = Math.round((height * maxWidth) / width);
              width = maxWidth;
            }
          } else {
            if (height > maxHeight) {
              width = Math.round((width * maxHeight) / height);
              height = maxHeight;
            }
          }

          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', 0.50)); 
        };
        img.onerror = () => {
          resolve(base64Str);
        };
      });
    }

    function initGalleryObserver() {
      if (galleryObserver) galleryObserver.disconnect();
      if (showcaseObserver) showcaseObserver.disconnect();

      galleryObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('reveal');
          } else {
            entry.target.classList.remove('reveal');
          }
        });
      }, { threshold: 0.05 });
      document.querySelectorAll('.gallery-item').forEach(el => galleryObserver.observe(el));

      showcaseObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('revealed-slide');
          } else {
            entry.target.classList.remove('revealed-slide');
          }
        });
      }, { threshold: 0.05 });
      const targetSec = document.getElementById('showcase-section');
      if (targetSec) showcaseObserver.observe(targetSec);

      const revealLefts = document.querySelectorAll('.scroll-reveal-left');
      const revealRights = document.querySelectorAll('.scroll-reveal-right');
      
      const scrollObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('scroll-reveal-active');
          } else {
            entry.target.classList.remove('scroll-reveal-active');
          }
        });
      }, { threshold: 0.1 });
      
      revealLefts.forEach(el => scrollObserver.observe(el));
      revealRights.forEach(el => scrollObserver.observe(el));

      clearInterval(rewardInterval);

      if (currentTab !== 'home') return;

      const cfg = getConfig();
      const rewardStr = cfg.rewardsList || '095***567:433,000,095***091:2,050,000,088***324:120,500';
      const items = rewardStr.split(',').map(x => x.trim()).filter(Boolean);

      if (items.length > 0) {

          const elPhone = document.getElementById('reward-phone-display');
          const elAmt = document.getElementById('reward-amount-display');
          if (!elPhone || !elAmt) return;

          rewardIndex = (rewardIndex + 1) % items.length;
          const currentItem = items[rewardIndex];

          if (currentItem && currentItem.includes(':')) {
            const parts = currentItem.split(':');
            const phone = parts[0] || 'User';
            const amt = parts[1] || '0';

            elPhone.style.opacity = '0';
            elAmt.style.opacity = '0';
            elPhone.style.transform = 'translateY(-8px)';
            elAmt.style.transform = 'translateY(-8px)';
            elPhone.style.transition = 'all 0.4s cubic-bezier(0.16, 1, 0.3, 1)';
            elAmt.style.transition = 'all 0.4s cubic-bezier(0.16, 1, 0.3, 1)';

            setTimeout(() => {
              elPhone.innerText = phone;
              elAmt.innerText = amt + ' THB';
              elPhone.style.opacity = '1';
              elAmt.style.opacity = '1';
              elPhone.style.transform = 'translateY(0)';
              elAmt.style.transform = 'translateY(0)';
            }, 400);
          }
        }, 3000);
      }
    }

    function startRun(btnElement) {
      if (isOrderProcessing) return; 
      isOrderProcessing = true;

      if (btnElement) { 
        btnElement.disabled = true; 
        btnElement.innerHTML = `<i data-lucide="loader-2" class="animate-spin inline mr-1 text-white"></i> ${t('processing')}`; 
        safeCreateIcons(); 
      }
      const u = currentUser;
      if (!u) {
        isOrderProcessing = false;
        return;
      }
      const creditVal = u.credit || 0;
      const done = u.runIndex || 0;
      const userLevel = u.userLevel || '';

      if (!userLevel || userLevel === '0' || userLevel === '') {
        showModal(`
          <div class="text-center py-4 relative font-sans">
            <button onclick="closeModal()" class="absolute -top-2 -right-2 text-slate-400 hover:text-slate-600 focus:outline-none transition-colors">
              <i data-lucide="x" class="w-6 h-6"></i>
            </button>
            <h3 class="text-lg font-bold text-slate-700 mb-2 mt-4">สุ่มสินค้าอัตโนมัติ</h3>
            <p class="text-slate-500 text-sm leading-relaxed">คุณยังไม่ได้กำหนด VIP โปรติดต่อผู้ดูแลระบบของคุณ</p>
          </div>
        `);
        if (btnElement) { 
          btnElement.disabled = false; 
          btnElement.innerHTML = `<i data-lucide="play-circle"></i> ${t('startMatch')}`; 
        }
        isOrderProcessing = false;
        safeCreateIcons();
        return;
      }

      if (getUserOrders().find(o => o && o.status === 'pending')) {
        showModal(`
          <div class="text-center py-4 font-sans">
            <div class="w-20 h-20 bg-amber-50 text-amber-500 rounded-3xl flex items-center justify-center mx-auto mb-4 border border-amber-100"><i data-lucide="alert-circle" class="w-10 h-10"></i></div>
            <h3 class="text-lg font-bold text-slate-800 font-semibold">${t('pendingExist')}</h3>
            <p class="text-slate-600 text-sm mt-2 leading-relaxed">${t('pendingExistSub')}</p>
            <button onclick="closeModal(); switchTab('history'); switchHistoryTab('orders');" class="mt-6 w-full py-3.5 bg-primary text-white font-bold rounded-2xl shadow-md text-base hover:opacity-95 active:scale-[0.98] transition font-mono">${t('viewPending')}</button>
          </div>`);
        if(btnElement) { btnElement.disabled = false; btnElement.innerHTML = `<i data-lucide="play-circle"></i> ${t('startMatch')}`; safeCreateIcons(); } 
        return;
      }

      if (creditVal <= 0) {
        showModal(`
          <div class="text-center py-4 font-sans">
            <div class="w-20 h-20 bg-slate-900 text-white rounded-3xl flex items-center justify-center mx-auto mb-4"><i data-lucide="alert-circle" class="w-10 h-10"></i></div>
            <h3 class="text-lg font-bold text-slate-800 font-semibold">${t('insufficientBal')}</h3>
            <button onclick="closeModal(); showSupportModal();" class="mt-6 w-full py-3.5 bg-slate-900 text-white font-bold rounded-2xl shadow-md flex justify-center items-center gap-2 text-base hover:bg-black transition font-mono">${t('contactSupport')}</button>
            <button onclick="closeModal()" class="mt-3 w-full py-3 bg-slate-100 text-slate-600 font-bold rounded-2xl hover:bg-slate-200 font-mono">${t('close')}</button>
          </div>`);
        if(btnElement) { btnElement.disabled = false; btnElement.innerHTML = `<i data-lucide="play-circle"></i> ${t('startMatch')}`; safeCreateIcons(); } 
        return;
      }

      const availableProducts = getProducts().map(normalizeProduct).filter(p => String(p.vipLevel) === String(userLevel));
      const targetOrderNum = done + 1;
      
      const specialProductRaw = getSpecialAssignments().find(s => s && s.targetUser === u.id && Number(s.targetIndex) === targetOrderNum);
      let pToRun = null; let isSpecial = false;
      
      if (specialProductRaw) { 
        pToRun = normalizeProduct(specialProductRaw); isSpecial = true; 
      } else {
        if (availableProducts.length === 0) { showToast(t('noProductTier'),'info'); isOrderProcessing = false; if(btnElement) { btnElement.disabled = false; btnElement.innerHTML = `<i data-lucide="play-circle"></i> ${t('startMatch')}`; safeCreateIcons(); } return; }
        if (done >= availableProducts.length) { showToast(t('allTasksDone'),'info'); isOrderProcessing = false; if(btnElement) { btnElement.disabled = false; btnElement.innerHTML = `<i data-lucide="play-circle"></i> ${t('startMatch')}`; safeCreateIcons(); } return; }
        pToRun = availableProducts[done];
      }
      processOrderFlowStep1(pToRun, isSpecial, btnElement);
    }

    async function processOrderFlowStep2(productIdOrObj, isSpecial) {
      const u = currentUser; 
      if (!u) {
        isOrderProcessing = false;
        return;
      }
      const creditVal = Number(u.credit) || 0;
      const usernameVal = u.username || 'User';
      
      let pRaw = typeof productIdOrObj === 'object' ? productIdOrObj : publicData.products.find(d => d.__backendId === productIdOrObj); 
      
      if(!pRaw && typeof productIdOrObj === 'string') {
        pRaw = userSpecialAssignData.find(d => d && (d.__backendId === productIdOrObj || d.id === productIdOrObj));
      }
      if(!pRaw && typeof productIdOrObj === 'string') {
        pRaw = userOrdersData.find(d => d && (d.__backendId === productIdOrObj || d.id === productIdOrObj));
      }
      if(!pRaw) {
        isOrderProcessing = false;
        return;
      }

      const p = normalizeProduct(pRaw);
      
      const isSpecialMode = (isSpecial === true || String(isSpecial) === 'true');
      const targetPrice = Number(p.productPrice) || 0;

      if (creditVal < targetPrice) { 
        const existingPending = getUserOrders().find(o => o && o.status === 'pending');
        if (p.type !== 'order' && !existingPending) {
          const orderId = genId();
          const orderData = { 
            type:'order', id:orderId, __backendId:orderId, userId:u.id, username:usernameVal, 
            productName:p.productName, productPrice:targetPrice, 
            commission:Number(p.commission)||0, productImage:p.productImage||'', 
            status:'pending', isSpecial: isSpecialMode, createdAt: new Date().toISOString() 
          };
          await setDoc(doc(db, "orders", orderData.id), orderData);
          Object.assign(p, normalizeProduct(orderData));
        } else if (existingPending) { 
          Object.assign(p, normalizeProduct(existingPending)); 
        }
        showModal(`
          <div class="text-center font-mono">
            <div class="w-full h-64 bg-slate-100 rounded-2xl mb-4 overflow-hidden border border-slate-200 flex items-center justify-center p-4 relative">
              ${p.productImage ? `<img src="${safeImgUrl(p.productImage)}" class="w-full h-full object-contain relative z-0" onerror="this.onerror=null;">` : `<i data-lucide="package" class="w-20 h-20 text-slate-300 relative z-0"></i>`}
            </div>
            <p class="text-xs text-rose-500 font-bold mt-4">${t('insufficientShortfall')} ฿${Math.max(0, targetPrice - creditVal).toLocaleString()}</p>
            <button onclick="closeModal(); showTopupModal();" class="mt-4 w-full py-3.5 bg-emerald-50 text-white font-bold rounded-2xl hover:bg-emerald-600 transition shadow-md text-base flex justify-center items-center gap-2"><span>${t('deposit')}</span></button>
            <button onclick="closeModal(); switchTab('history'); switchHistoryTab('orders');" class="mt-2.5 w-full py-3 bg-slate-200 text-slate-600 font-bold rounded-2xl hover:bg-slate-350 transition">${t('viewPending')}</button>
          </div>`);

        return;
      }

      showModal(`
        <div class="text-center font-mono">
          <div class="w-full h-64 bg-white rounded-2xl mb-5 overflow-hidden border border-slate-100 flex items-center justify-center shadow-inner p-4 bg-slate-100">
            ${p.productImage ? `<img src="${safeImgUrl(p.productImage)}" class="w-full h-full object-contain" onerror="this.onerror=null;">` : `<i data-lucide="package" class="w-20 h-20 text-slate-300"></i>`}
          </div>

              <span class="text-slate-600 font-bold">${t('walletBal')}</span> 
              <span class="font-bold text-primary">฿${creditVal.toLocaleString()}</span>
            </div>
            <div class="flex justify-between text-base border-t border-slate-200 pt-2 mt-2">
              <span class="text-slate-955 font-bold">${t('amountDue')}</span> 
              <span class="font-black text-slate-950">฿${targetPrice.toLocaleString()}</span>
            </div>

          <button onclick="confirmOrderSuccess('${p.__backendId || p.id}', ${isSpecialMode})" id="btn-confirm-final" class="mt-6 w-full py-3.5 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-2xl shadow-md active:scale-[0.98] transition text-base font-mono">${t('confirmPurchase')}</button>
        </div>`);

    async function confirmOrderSuccess(id, isSpecial) {
      const btn = $('btn-confirm-final'); 
      if(!btn || btn.disabled) return;
      btn.disabled = true; 
      btn.innerHTML = t('processing');
      
      let pRaw = publicData.products.find(d => d.__backendId === id) || userSpecialAssignData.find(d => d && (d.__backendId === id || d.id === id)) || userOrdersData.find(d => d && (d.__backendId === id || d.id === id)); 
      if(!pRaw) {
        btn.disabled = false;
        btn.innerHTML = t('confirmPurchase');
        isOrderProcessing = false;
        return;
      }

      const p = normalizeProduct(pRaw);
      let userDocRef = doc(db, "users", currentUser.id);

      try {
        await runTransaction(db, async (transaction) => {
          const snap = await transaction.get(userDocRef);
          if (!snap.exists()) throw "User does not exist!";
          
          const userData = snap.data();
          const currentCredit = Number(userData.credit) || 0;
          const currentRunIndex = Number(userData.runIndex) || 0;

          const pPrice = Number(p.productPrice) || 0;
          const pComm = Number(p.commission) || 0;

          if (currentCredit < pPrice) throw "Credit insufficient!";

          let assignDocRef = null;
          let assignSnapExists = false;

          if (isSpecial) {
            const assignment = userSpecialAssignData.find(s => s && s.targetUser === userData.id && Number(s.targetIndex) === (currentRunIndex + 1));
            if (assignment) {
              assignDocRef = doc(db, "special_assignments", assignment.__backendId || assignment.id);
              const assignSnap = await transaction.get(assignDocRef); 
              assignSnapExists = assignSnap.exists();
            }
          }

          let calculatedCredit = currentCredit - pPrice + (pPrice + pComm); 

          transaction.update(userDocRef, {
            credit: calculatedCredit,
            runIndex: currentRunIndex + 1
          });

          if (p.type === 'order') {
            transaction.update(doc(db, "orders", p.__backendId || p.id), { status: 'completed' });
          } else {
            const newOrderRef = doc(collection(db, "orders"));
            transaction.set(newOrderRef, {
              type: 'order',
              id: newOrderRef.id,
              userId: currentUser.id, 
              username: userData.username || 'User',
              productName: p.productName,
              productPrice: pPrice,
              commission: pComm,
              productImage: p.productImage || '',
              status: 'completed',
              isSpecial: isSpecial,
              createdAt: new Date().toISOString()
            });
          }

          if (isSpecial && assignDocRef && assignSnapExists) {
            transaction.delete(assignDocRef); 
          }
        });

        showModal(`
          <div class="text-center py-4 font-mono">
            <div class="w-20 h-20 bg-emerald-50 text-emerald-500 rounded-3xl flex items-center justify-center mx-auto mb-4 border border-emerald-100"><i data-lucide="check-circle" class="w-12 h-12"></i></div>
            <h3 class="text-lg font-black text-emerald-600 mb-1 font-semibold">${t('taskCompleted')}</h3>
            <p class="text-slate-500 text-xs font-medium">${t('commCredited')}</p>
            <button onclick="closeModal(); lastRenderedTab=''; renderTabContent();" class="mt-6 w-full py-3.5 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-2xl transition shadow-md text-base font-mono">${t('continueBtn')}</button>
          </div>`);

      } catch (err) {
        console.error("Firestore Transaction Error: ", err); 
        showToast(t('errorProcessingOrder'), 'error');
        closeModal();
      } finally {
        isOrderProcessing = false;
      }
    }

    function switchHistoryTab(tab) { 
      historyTab = tab; 
      lastRenderedTab = ''; 
      renderTabContent(); 
    }

    window.settlePendingOrder = async (orderId, isSpecial, btn) => {
      if (isOrderProcessing) return;
      isOrderProcessing = true;
      
      const u = currentUser;
      const pRaw = userOrdersData.find(o => o && (o.__backendId === orderId || o.id === orderId));
      if (!pRaw) {
        isOrderProcessing = false;
        return;
      }

      const p = normalizeProduct(pRaw);

      if (btn) {
        btn.disabled = true;
        btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin inline mr-1 text-white"></i> ${t('processing')}`;
        safeCreateIcons();
      }
      
      const targetPrice = Number(p.productPrice) || 0;
      const currentCredit = Number(u.credit) || 0;

      if (currentCredit < targetPrice) {
        isOrderProcessing = false;
        if (btn) {
          btn.disabled = false;
          btn.innerHTML = t('textSettlePending');
          safeCreateIcons();
        }
        showModal(`
          <div class="text-center py-4 font-mono">
            <div class="w-16 h-16 bg-rose-50 text-rose-500 rounded-3xl flex items-center justify-center mx-auto mb-4 border border-rose-100">
              <i data-lucide="alert-circle" class="w-8 h-8 text-rose-500"></i>
            </div>
            <h3 class="text-lg font-bold text-slate-800">${t('insufficientBal')}</h3>
            <p class="text-slate-500 text-sm mt-2">ยอดเครดิตของคุณไม่เพียงพอสำหรับการชำระออเดอร์นี้ กรุณาทำการเติมเงินเพื่อทำรายการต่อ</p>
            <p class="text-xs text-rose-500 font-bold mt-2">${t('insufficientShortfall')} ฿${Math.max(0, targetPrice - currentCredit).toLocaleString()}</p>
            <div class="flex gap-3 mt-5">
              <button onclick="closeModal()" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-2xl font-bold hover:bg-slate-200 transition text-xs">${t('close')}</button>
              <button onclick="closeModal(); showTopupModal();" class="flex-1 py-3 bg-primary text-white font-bold rounded-2xl shadow-md hover:opacity-95 transition text-xs">${t('deposit')}</button>
            </div>
          </div>
        `);
        return;
      }
      
      processOrderFlowStep2(orderId, isSpecial);
    };

    function renderHistory(c) {
      c.innerHTML = `
        <div id="history-container" class="p-4 fade-in">
          <input type="hidden" id="hist-tab-state" value="${historyTab}">
          <div class="bg-theme-gradient text-white rounded-[32px] p-5 mb-5 shadow-lg relative overflow-hidden font-mono">
            <div class="absolute right-0 top-0 opacity-10"><i data-lucide="wallet" class="w-32 h-32 -mt-4 -mr-4"></i></div>
            <div class="relative z-10">
              <p class="text-white/70 text-xs font-semibold mb-1 uppercase tracking-wide">${t('availBalance')}</p>
              <p id="hist-credit-display" class="text-2xl font-black tracking-tight">฿0</p>
            </div>
          </div>
          <h2 class="text-base font-bold text-slate-800 mb-4 px-1.5 flex items-center gap-2"><i data-lucide="activity" class="text-primary"></i> ${t('activityLog')}</h2>
          
          <div class="flex bg-slate-200/50 p-1.5 rounded-2xl mb-5 border border-slate-200/20 backdrop-blur-md">
            <button onclick="switchHistoryTab('orders')" class="flex-1 py-3 rounded-xl font-bold text-sm transition-all duration-200 ${historyTab === 'orders' ? 'bg-white text-primary shadow-md scale-[1.02]' : 'text-slate-500 hover:text-slate-700'}">${t('orders')}</button>
            <button onclick="switchHistoryTab('transactions')" class="flex-1 py-3 rounded-xl font-bold text-sm transition-all duration-200 ${historyTab === 'transactions' ? 'bg-white text-primary shadow-md scale-[1.02]' : 'text-slate-500 hover:text-slate-700'}">${t('transactions')}</button>
          </div>
          <div id="hist-list-container"></div>
        </div>`;
    }

    function renderProfile(c) {
      const u = currentUser;
      if (!u) {
        c.innerHTML = '';
        return;
      }
      const creditVal = u.credit || 0;
      const usernameVal = u.username || 'User';
      const userLevel = u.userLevel || '';
      
      const logoUrl = getLogoUrl(); 
      let levelText = userLevel ? 'VIP ' + userLevel : 'ยังไม่ได้กำหนด VIP'; 
      if(userLevel === 'fixturn') levelText = t('vipFixturn'); 
      if(userLevel === 'allowwd') levelText = t('vipAllowwd');

      const levelBadgeHtml = (userLevel === 'allowwd')
        ? ''
        : `<span class="inline-block mt-3 px-4 py-1.5 bg-amber-50 text-amber-600 text-xs font-bold rounded-full border border-amber-200 shadow-sm font-mono font-semibold">⭐ ${levelText}</span>`;

      c.innerHTML = `
        <div id="profile-container" class="p-4 space-y-5 fade-in relative font-mono">
          <div class="bg-white p-6 rounded-[32px] shadow-sm border border-slate-100 text-center relative overflow-hidden">
            
            <div class="absolute top-4 right-4 z-10">
              <button onclick="showLanguageSelector()" class="px-3.5 py-1.5 bg-slate-50 hover:bg-slate-100 text-slate-700 font-bold text-sm rounded-xl border border-slate-200 transition flex items-center gap-1.5 shadow-sm active:scale-95">
                <i data-lucide="languages" class="w-4 h-4 text-primary"></i>
                <span>${currentLang === 'th' ? 'เปลี่ยนภาษา' : 'Change Language'}</span>
              </button>
            </div>

            <div class="w-32 h-32 rounded-full mx-auto overflow-hidden mt-6 flex items-center justify-center bg-slate-50 border border-slate-100 shadow-lg">
              ${logoUrl ? `<img src="${safeImgUrl(logoUrl)}" class="app-logo-img w-full h-full object-cover rounded-full cursor-pointer bg-slate-100" onclick="handleLogoClick()" onerror="this.onerror=null;">` : `<div class="w-32 h-32 bg-blue-50 text-primary rounded-full flex items-center justify-center cursor-pointer" onclick="handleLogoClick()"><i data-lucide="user" class="w-16 h-16 text-primary"></i></div>`}
            </div>
            <h3 class="font-black text-xl text-slate-800 mt-3 font-semibold">${usernameVal}</h3>
            <p class="text-slate-400 text-sm mt-1 font-semibold">📞 ${u.phone}</p>
            ${levelBadgeHtml}
            <div class="mt-5 pt-4 border-t border-slate-100 text-center">
              <p class="text-xs text-slate-400 font-bold uppercase mb-1">${t('availBalance')}</p>
              <p id="prof-credit-display" class="text-2xl font-black text-primary">฿${safeFormatNumber(creditVal)}</p>
            </div>
          </div>
          <div class="bg-white p-5 rounded-[32px] shadow-sm border border-slate-100">
            <div class="flex justify-between items-center mb-4">
              <h3 class="font-bold text-slate-800 flex items-center gap-2 text-sm font-semibold"><i data-lucide="credit-card" class="text-primary stroke-[2.2]"></i> ${t('bankAccount')}</h3>
              <button onclick="showEditBank()" class="text-xs text-primary font-bold bg-blue-50 px-3.5 py-1.5 rounded-xl hover:bg-blue-100 transition font-mono">${t('editBank')}</button>
            </div>
            ${u.bankName ? `
              <div class="bg-slate-50/50 p-4 rounded-2xl border border-slate-200/50 text-left font-mono">
                <p class="text-xs text-slate-400 font-semibold mb-1 uppercase">${t('bank')}</p>
                <p class="font-bold text-slate-800 mb-3 text-sm">${u.bankName}</p>
                <p class="text-xs text-slate-400 font-semibold mb-1 uppercase">${t('accNumber')}</p>
                <p class="font-mono text-base text-slate-700 tracking-wider font-bold">${u.bankNumber}</p>
              </div>` : `
              <div class="bg-rose-50/40 p-4 rounded-2xl border border-rose-100 text-center font-mono">
                <p class="text-rose-500 font-bold text-xs">${t('noBankDetails')}</p>
              </div>`}
          </div>
          <div class="space-y-3 pt-2">
            <button onclick="showTopupModal()" class="w-full py-4 bg-emerald-500 text-white rounded-2xl font-bold shadow-md flex justify-center items-center gap-2 text-base hover:bg-emerald-600 transition font-mono">${t('deposit')}</button>
            <button onclick="showWithdrawModal()" class="w-full py-4 bg-theme-gradient text-white rounded-2xl font-bold shadow-lg flex justify-center items-center gap-2 text-base hover:opacity-95 transition font-mono">${t('withdrawal')}</button>
            <button onclick="showSupportModal()" class="w-full py-4 bg-white text-slate-700 rounded-2xl font-bold shadow-sm border border-slate-100 flex justify-center items-center gap-2 text-base hover:bg-slate-50 transition font-mono">${t('contactSupport')}</button>
          </div>
        </div>`;
    }

    function showEditBank() {
      const u = currentUser;
      if (!u) return;
      const cfg = getConfig();
      const bankString = cfg.supportedBanks || 'KBank,SCB,BBL,KTB,Krungsri,GSB,TrueMoney';
      const bankList = bankString.split(',').map(b => b.trim()).filter(Boolean);

      showModal(`
        <h3 class="font-bold text-lg mb-4 text-slate-800 font-mono">${t('bankAccount')}</h3>
        <select id="inp-bank" class="w-full px-4 py-3 border border-slate-200 bg-slate-50 rounded-2xl mb-3 outline-none text-slate-700 font-medium text-sm font-mono">
          <option value="" disabled ${!u.bankName ? 'selected' : ''}>${t('selectBank')}</option>
          ${bankList.map(bank => `<option value="${bank}" ${u.bankName===bank?'selected':''}>${bank}</option>`).join('')}
        </select>
        <input id="inp-bank-num" class="w-full px-4 py-3 border border-slate-200 bg-slate-50 rounded-2xl mb-5 outline-none font-semibold text-sm font-mono" placeholder="${t('accNumber')}" value="${u.bankNumber||''}">
        <div class="flex gap-3 font-mono">
          <button onclick="closeModal()" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-2xl font-bold hover:bg-slate-200">${t('cancel')}</button>
          <button onclick="saveBank()" class="flex-1 py-3 bg-primary text-white rounded-2xl font-bold shadow-md">${t('saveSettings')}</button>
        </div>`);
    }

    async function saveBank() {
      if (!currentUser) return;
      const bankName = $('inp-bank').value; if (!bankName) return showToast(t('pleaseSelectBank'), 'error');
      const bankNum = $('inp-bank-num').value.trim(); if (!bankNum) return showToast(t('pleaseFillAcc'), 'error');
      
      const btn = document.querySelector('button[onclick="saveBank()"]');
      if (btn) {
        btn.disabled = true;
        btn.innerText = t('processing');
      }

      try {
        let userDocRef = doc(db, "users", currentUser.id);
        await updateDoc(userDocRef, {
          bankName: bankName,
          bankNumber: bankNum
        });
        
        currentUser.bankName = bankName;
        currentUser.bankNumber = bankNum;
        
        showToast(t('settingsSaved')); 
        closeModal(); 
        lastRenderedTab = ''; 
        renderTabContent(); 
      } catch (err) {
        showToast(t('connectionError') + err.message, 'error');
        if (btn) {
          btn.disabled = false;
          btn.innerText = t('saveSettings');
        }
      }
    }

    function showWithdrawModal() {
      const u = currentUser;
      if (!u) return;
      const creditVal = u.credit || 0;
      if (!u.bankName || !u.bankNumber) return showToast(t('noBankDetails'),'error');
      if (getUserOrders().find(o => o && o.status === 'pending')) return showToast(t('cantWdPending'),'error');
      showModal(`
        <div class="text-center font-mono">
          <div class="w-16 h-16 bg-blue-50 text-primary rounded-3xl flex items-center justify-center mx-auto mb-2 border border-blue-100"><i data-lucide="arrow-down-to-line" class="w-8 h-8"></i></div>
          <h3 class="font-bold text-lg text-slate-800 mb-1 font-semibold">${t('withdrawFunds')}</h3>
          <p class="text-xs text-slate-500 mb-5">${t('withdrawable')} <span class="font-bold text-primary">฿${creditVal.toLocaleString()}</span></p>
          <input id="inp-wd-amount" type="number" class="w-full px-4 py-3 border border-slate-200 bg-slate-50 rounded-2xl mb-3 outline-none text-center font-bold text-lg" placeholder="${t('amount')}">
          <input id="inp-wd-pin" type="password" class="w-full px-4 py-3 border border-slate-200 bg-slate-50 rounded-2xl mb-6 outline-none text-center tracking-widest font-semibold text-sm" placeholder="${t('pin')}">
          <div class="flex gap-3">
            <button onclick="closeModal()" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-2xl font-bold hover:bg-slate-200">${t('cancel')}</button>
            <button onclick="doWithdraw()" id="btn-wd" class="flex-1 py-3 bg-primary text-white rounded-2xl font-bold shadow-md">${t('withdrawal')}</button>
          </div>
        </div>`);
    }

    async function doWithdraw() {
      const u = currentUser; 
      if (!u) return;
      const amt = parseFloat($('inp-wd-amount').value); const pin = $('inp-wd-pin').value.trim();
      const creditVal = u.credit || 0;
      const withdrawPassword = u.withdrawPassword;
      const usernameVal = u.username || 'User';
      
      if (isNaN(amt) || amt <= 0 || creditVal < amt) return showToast(t('invalidWdBal'),'error');

      const hashedPin = await hashValue(pin);
      if (String(withdrawPassword) !== String(pin) && String(withdrawPassword) !== String(hashedPin)) {
        return showToast(t('invalidPIN'),'error');
      }
      
      $('btn-wd').disabled = true; $('btn-wd').textContent = t('processing');
      
      let userDocRef = doc(db, "users", u.id);
      let wdCol = collection(db, "withdrawals");
      try {
        await runTransaction(db, async (transaction) => {
          const snap = await transaction.get(userDocRef);
          const currentCredit = snap.data().credit || 0;
          if (currentCredit < amt) throw "Insufficient Balance";

          const updatePayload = {
            credit: currentCredit - amt
          };

          transaction.update(userDocRef, updatePayload);
          
          const newWdRef = doc(wdCol);
          transaction.set(newWdRef, {
            type: 'withdrawal',
            id: newWdRef.id,
            userId: u.id,
            username: usernameVal,
            amount: amt,
            bankName: u.bankName,
            bankNumber: u.bankNumber,
            status: 'pending',
            createdAt: new Date().toISOString()
          });
        });

        showToast(t('wdSentSuccess'));
        closeModal();
      } catch (err) {
        showToast(t('wdFailed'), 'error');
        closeModal();
      }
    }

    window.togglePasswordVisibility = (inputId, btnEl) => {
      const input = document.getElementById(inputId);
      if (!input) return;
      const icon = btnEl.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        if (icon) icon.setAttribute('data-lucide', 'eye-off');
      } else {
        input.type = 'password';
        if (icon) icon.setAttribute('data-lucide', 'eye');
      }
      safeCreateIcons();
    };

    // ==========================================
    // INITIALIZATION RUN
    // ==========================================
    initAppFlow();

    // ==========================================
    // WINDOW GLOBAL EXPORTS
    // ==========================================
    window.doLogin = doLogin;
    window.doRegister = doRegister;
    window.showRegisterForm = showRegisterForm;
    window.showLoginForm = showLoginForm;
    window.doLogout = doLogout;
    window.switchTab = switchTab;
    window.showSupportModal = showSupportModal; 
    window.showTopupModal = showTopupModal;
    window.showWithdrawModal = showWithdrawModal;
    window.showEditBank = showEditBank;
    window.saveBank = saveBank;
    window.doWithdraw = doWithdraw;
    window.startRun = startRun;
    window.triggerStep1Delay = triggerStep1Delay;
    window.confirmOrderSuccess = confirmOrderSuccess;
    window.processOrderFlowStep2 = processOrderFlowStep2;
    window.switchHistoryTab = switchHistoryTab;
    window.closeModal = closeModal;
    window.openMenuIconPopup = openMenuIconPopup;
    window.handleLogoClick = handleLogoClick;
    window.settlePendingOrder = settlePendingOrder;
  </script>
 </body>
</html>
