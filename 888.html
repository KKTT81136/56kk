      if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { e.preventDefault(); return false; }

  <script>
    (function() {
      var cached = localStorage.getItem('tos_cached_config');
      var p = '#FFFFFF'; 
      var s = '#4f46e5';
      var type = 'gradient';
      if (cached) {
        try {
          var cfg = JSON.parse(cached);
          p = cfg.themePrimary || p;
          s = cfg.themeSecondary || s;
          type = cfg.themeType || type;
          if (cfg.tabTitle) {
            document.title = cfg.tabTitle + " - แอดมิน";
          }
        } catch (e) {}
      }
      document.documentElement.style.setProperty('--color-primary', p);
      document.documentElement.style.setProperty('--color-secondary', s);

      var bgStyle = (type === 'single') 
        ? "background: " + p + " !important;" 
        : "background: linear-gradient(135deg, " + p + ", " + s + ") !important;";

      var cssRules = [
        ":root {",
        "  --color-primary: " + p + ";",
        "  --color-secondary: " + s + ";",
        "}",
        ".text-sky-400 { color: " + s + " !important; }",
        ".bg-sky-600 { background-color: " + s + " !important; }",
        ".bg-sky-500 { background-color: " + s + " !important; }",
        ".border-sky-500 { border-color: " + s + " !important; }",
        ".border-sky-500\\/30 { border-color: " + s + "4d !important; }",
        ".text-sky-500 { color: " + s + " !important; }",
        ".bg-sky-500\\/10 { background-color: " + s + "1a !important; }",
        ".text-primary { color: " + p + " !important; }",
        ".bg-primary { background-color: " + p + " !important; }",
        ".border-primary { border-color: " + p + " !important; }",
        ".bg-theme-gradient { " + bgStyle + " }"
      ].join("\n");

      document.write('<style id="dynamic-theme-style">' + cssRules + '</style>');
    })();
  </script>

    function normalizeProduct(p) {
      if (!p) return null;
      let rawPrice = p.productPrice !== undefined ? p.productPrice : p.price;
      let cleanedPrice = 0;
      if (typeof rawPrice === 'number') {
        cleanedPrice = rawPrice;
      } else if (typeof rawPrice === 'string') {
        cleanedPrice = parseFloat(rawPrice.replace(/[^0-9.]/g, '')) || 0;
      }
      return {
        id: p.id || p.__backendId || '',
        __backendId: p.__backendId || p.id || '',
        productName: p.productName || p.name || '',
        productPrice: cleanedPrice,
        commission: Number(p.commission) || 0,
        productImage: p.productImage || p.image || '',
        vipLevel: p.vipLevel !== undefined ? String(p.vipLevel) : '',
        isSpecial: p.isSpecial || false,
        type: p.type || 'product',
        discount: p.discount || '',
        originalPrice: p.originalPrice || '',
        createdAt: p.createdAt || '',
        order: p.order !== undefined ? p.order : (p.productOrder !== undefined ? p.productOrder : 1),
        targetUser: p.targetUser || '',
        targetIndex: p.targetIndex || 1
      };
    }

    function genId() {
      if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
        return crypto.randomUUID();
      }
      return Date.now().toString(36) + Math.random().toString(36).slice(2,8);
    }

    async function hashValue(string) {
      if (!string) return '';
      try {
        const utf8 = new TextEncoder().encode(string);
        const hashBuffer = await crypto.subtle.digest('SHA-256', utf8);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
      } catch (e) {
        return string;
      }
    }

    function showToast(msg, type='success') {
      const Toast = Swal.mixin({
        toast: true,
        position: 'top-end',
        showConfirmButton: false,
        timer: 3000,
        timerProgressBar: true,
        background: '#ffffff',
        color: '#0f172a',
        iconColor: type === 'success' ? '#10b981' : (type === 'error' ? '#ef4444' : '#0284c7'),
        didOpen: (toast) => {
          toast.addEventListener('mouseenter', Swal.stopTimer)
          toast.addEventListener('mouseleave', Swal.resumeTimer)
        }
      });

      Toast.fire({
        icon: type === 'success' ? 'success' : (type === 'error' ? 'error' : 'info'),
        title: msg
      });
    }

    function safeCreateIcons() {
      if (typeof lucide !== 'undefined' && typeof lucide.createIcons === 'function') {
        lucide.createIcons();
      }
    }

    function showModal(content) {
      let m = $('modal-overlay');
      if (!m) { 
        m = document.createElement('div'); m.id = 'modal-overlay'; 
        m.addEventListener('click', function(e) { if (e.target === m) closeModal(); });
        document.body.appendChild(m); 
      }
      m.className = 'fixed inset-0 bg-black/40 z-[100] flex items-center justify-center p-4 cursor-pointer backdrop-blur-sm';
      m.innerHTML = `
        <div class="bg-white text-slate-900 rounded-2xl p-6 w-full max-w-md modal-anim shadow-2xl border border-slate-200 max-h-[90vh] overflow-y-auto cursor-auto" onclick="event.stopPropagation()">
          ${content}
        </div>`;
      safeCreateIcons();
    }
    function closeModal() { const m = $('modal-overlay'); if (m) m.remove(); }

    function applyTheme(primary, secondary, themeType) {
      const p = primary || '#FFFFFF'; 
      const s = secondary || '#4f46e5';
      const type = themeType || 'gradient';
      
      document.documentElement.style.setProperty('--color-primary', p);
      document.documentElement.style.setProperty('--color-secondary', s);

      let styleEl = document.getElementById('dynamic-theme-style');
      if (!styleEl) {
        styleEl = document.createElement('style');
        styleEl.id = 'dynamic-theme-style';
        document.head.appendChild(styleEl);
      }
      
      const bgStyle = (type === 'single') 
        ? `background: ${p} !important;` 
        : `background: linear-gradient(135deg, ${p}, ${s}) !important;`;

      styleEl.innerHTML = `
        :root {
          --color-primary: ${p};
          --color-secondary: ${s};
        }
        .text-sky-400 { color: ${s} !important; }
        .bg-sky-600 { background-color: ${s} !important; }
        .bg-sky-500 { background-color: ${s} !important; }
        .border-sky-500 { border-color: ${s} !important; }
        .border-sky-500\\/30 { border-color: ${s}4d !important; }
        .text-sky-500 { color: ${s} !important; }
        .bg-sky-500\\/10 { background-color: ${s}1a !important; }
        .text-primary { color: ${p} !important; }
        .bg-primary { background-color: ${p} !important; }
        .border-primary { border-color: ${p} !important; }
        .bg-theme-gradient { 
          ${bgStyle}
        }
      `;
    }

    const getCol = (type) => {
      const map = { 
        user: 'users', 
        order: 'orders', 
        product: 'products', 
        withdrawal: 'withdrawals', 
        config: 'configs', 
        banner: 'banners', 
        gallery: 'galleries', 
        menuIcon: 'menu_icons', 
        special_template: 'special_templates', 
        special_assignments: 'special_assignments',
        showcase_product: 'showcase_products'
      };
      return map[type] || 'misc';
    };

    const windowDataSdk = {
      create: async function(obj) {
        if(!obj.id) obj.id = genId();
        obj.__backendId = obj.id;
        const col = getCol(obj.type);
        await setDoc(doc(db, col, obj.id), obj);
        return {isOk: true};
      },
      update: async function(obj) {
        const backendId = obj.__backendId || obj.id;
        const col = getCol(obj.type);
        await setDoc(doc(db, col, backendId), obj);
        return {isOk: true};
      },
      delete: async function(obj) {
        const col = getCol(obj.type);
        await deleteDoc(doc(db, col, obj.__backendId || obj.id));
        return {isOk: true};
      }
    };

    function updateHeaderStats() {
      const elMembers = $('stat-total-members');
      const elOrders = $('stat-total-orders');
      const elProducts = $('stat-total-products');
      
      const textMembers = `${adminUsersData.length} บัญชี`;
      const textOrders = `${allUserOrdersData.length} รายการ`;
      const textProducts = `${publicData.products.length} ชิ้น`;

      if (elMembers && elMembers.innerText !== textMembers) elMembers.innerText = textMembers;
      if (elOrders && elOrders.innerText !== textOrders) elOrders.innerText = textOrders;
      if (elProducts && elProducts.innerText !== textProducts) elProducts.innerText = textProducts;
    }

    // ฟังก์ชันอัปเดตแจ้งเตือนจุดสีแดงฝั่งเมนูซ้าย Real-time
    function updateAdminBadges() {
      const pendingCount = adminWithdrawalsData.filter(w => w.status === 'pending' || w.status === 'deposit_pending').length;
      const badgeEl = $('badge-withdrawals-count');
      if (badgeEl) {
        if (pendingCount > 0) {
          badgeEl.innerHTML = `<span class="bg-rose-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full led-glow-amber animate-pulse">${pendingCount}</span>`;
        } else {
          badgeEl.innerHTML = '';
        }
      }
    }

    function renderPagination(totalItems, currentPage, callbackName) {
      const totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE) || 1;
      if (totalPages <= 1) return '';

      let html = `<div class="flex items-center justify-center gap-2 mt-6 font-mono text-sm">`;
      for (let i = 1; i <= totalPages; i++) {
        const activeClass = i === currentPage ? 'bg-sky-500 text-white font-semibold text-sm' : 'bg-slate-200 text-slate-600 hover:bg-slate-350 text-sm';
        html += `<button onclick="${callbackName}(${i})" class="px-3 py-1.5 rounded transition ${activeClass}">${i}</button>`;
      }
      html += `</div>`;
      return html;
    }

    async function saveConfigToFirebase(payload) {
      const docId = "system_config";
      payload.id = docId;
      payload.__backendId = docId;
      const cleanData = { ...payload };
      delete cleanData.__collection; 
      await setDoc(doc(db, "configs", docId), cleanData);
    }

    let adminRenderTimeout = null;
    function debouncedRenderAdminTab() {
      if (adminRenderTimeout) clearTimeout(adminRenderTimeout);
      adminRenderTimeout = setTimeout(() => {
        if ($('admin-content')) {
          const activeId = document.activeElement ? document.activeElement.id : null;
          let selectionStart = null;
          let selectionEnd = null;
          if (activeId) {
            const activeEl = $(activeId);
            if (activeEl && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA')) {
              try {
                selectionStart = activeEl.selectionStart;
                selectionEnd = activeEl.selectionEnd;
              } catch (e) {}
            }
          }

          renderAdminTab();
          updateAdminBadges();

          if (activeId) {
            const el = $(activeId);
            if (el) {
              el.focus();
              if (selectionStart !== null && selectionEnd !== null) {
                try {
                  el.setSelectionRange(selectionStart, selectionEnd);
                } catch (e) {}
              }
            }
          }
        }
      }, 30);
    }

    function startPublicSubscriptions() {
      activeListeners.configs = onSnapshot(doc(db, "configs", "system_config"), (docSnap) => {
        if (docSnap.exists()) {
          const cfgData = { ...docSnap.data(), __backendId: docSnap.id };
          const serialized = JSON.stringify(cfgData);
          if (lastSerialized.configs !== serialized) {
            lastSerialized.configs = serialized;
            publicData.configs = [cfgData];
            localStorage.setItem('tos_cached_config', serialized);
            applyTheme(cfgData.themePrimary, cfgData.themeSecondary, cfgData.themeType);
            
            const targetTitle = (cfgData.tabTitle || '') + " - แอดมิน";
            if (document.title !== targetTitle) {
              document.title = targetTitle;
            }
            debouncedRenderAdminTab();
          }
        }
        updateHeaderStats();
      }, (err) => {
        console.warn("ข้อกำหนดระบบโหลดผิดพลาด: ", err);
      });

      activeListeners.banners = onSnapshot(collection(db, "banners"), (snapshot) => {
        let banners = [];
        snapshot.forEach(d => banners.push({ ...d.data(), __backendId: d.id }));
        const serialized = JSON.stringify(banners);
        if (lastSerialized.banners !== serialized) {
          lastSerialized.banners = serialized;
          publicData.banners = banners;
          debouncedRenderAdminTab();

      }, (err) => console.warn(err));

      activeListeners.galleries = onSnapshot(collection(db, "galleries"), (snapshot) => {

      activeListeners.menuIcons = onSnapshot(collection(db, "menu_icons"), (snapshot) => {
        let icons = [];

        const sorted = icons.sort((a,b) => parseInt(a.menuOrder||0) - parseInt(b.menuOrder||0));

          publicData.menuIcons = sorted;
          debouncedRenderAdminTab();

      }, (err) => console.warn(err));

      activeListeners.products = onSnapshot(collection(db, "products"), (snapshot) => {

          lastSerialized.products = serialized;
          publicData.products = sorted;
          updateHeaderStats();
          debouncedRenderAdminTab();
        }
      }, (err) => console.warn(err));
    }

      stopAdminSubscriptions();

          debouncedRenderAdminTab();

      activeListeners.adminWithdrawals = onSnapshot(collection(db, "withdrawals"), (snapshot) => {
        let withdrawals = [];
        snapshot.forEach(d => withdrawals.push({ ...d.data(), __backendId: d.id }));
        const serialized = JSON.stringify(withdrawals);
        if (lastSerialized.adminWithdrawals !== serialized) {
          lastSerialized.adminWithdrawals = serialized;

      }, (err) => console.warn(err));

        if (lastSerialized.adminSpecialAssigns !== serialized) {

          debouncedRenderAdminTab();

    async function doAdminLogin() {
      const email = $('inp-admin-email').value.trim();
      const password = $('inp-admin-pass').value.trim();
      if (!email || !password) return showToast('กรุณากรอกข้อมูลเพื่อระบุตัวตนให้ครบถ้วน','error');
      if (!email.endsWith('@admin.com')) return showToast('อีเมลต้องลงท้ายด้วย @admin.com เท่านั้น','error');

      const btn = $('btn-admin-login');
      btn.disabled = true; btn.textContent = 'กำลังยืนยันสิทธิ์...';

      try {
        await signInWithEmailAndPassword(auth, email, password);
        showToast('เชื่อมต่อบอร์ดควบคุมแอดมินสำเร็จ');
      } catch (err) {
        btn.disabled = false; btn.textContent = 'เชื่อมต่อเข้าสู่ระบบ';
        showToast(`สิทธิ์การเข้าใช้งานถูกปฏิเสธ: ${err.message}`,'error');
      }
    }

    function promptUserBalanceUpdate(bid, adjustType) {
      const actionText = adjustType === 'deposit' ? 'เพิ่มเครดิต' : 'ลดเครดิต';
      Swal.fire({
        title: `${actionText}`,
        text: 'กรุณากรอกจำนวนเงิน:',
        input: 'number',
        inputAttributes: {
          min: 1,
          step: 1
        },
        showCancelButton: true,
        confirmButtonText: 'ตกลง',
        cancelButtonText: 'ยกเลิก',
        background: '#ffffff',
        color: '#0f172a',
        confirmButtonColor: '#0284c7',
        cancelButtonColor: '#404040'
      }).then((result) => {
        if (result.isConfirmed) {
          const amount = parseFloat(result.value);
          if (isNaN(amount) || amount <= 0) {
            showToast('กรุณากรอกจำนวนเงินที่ถูกต้อง', 'error');
            return;
          }
          const adjustAmount = adjustType === 'deposit' ? amount : -amount;
          adjustUserBalanceDirectly(bid, adjustAmount);
        }
      });
    }

    async function adjustUserBalanceDirectly(bid, adjustAmount) {
      const u = adminUsersData.find(d => d.__backendId === bid);
      if (!u) return showToast('ไม่พบข้อมูลบัญชีผู้ใช้ในระบบ', 'error');

      let userDocRef = doc(db, "users", u.id);
      let wdCol = collection(db, "withdrawals");
      try {
        await runTransaction(db, async (transaction) => {
          const snap = await transaction.get(userDocRef);
          if (!snap.exists()) return;
          const currentCredit = snap.data().credit || 0;

          const updatePayload = {
            credit: Math.max(0, currentCredit + adjustAmount)
          };

          transaction.update(userDocRef, updatePayload);

          const newWdRef = doc(wdCol);
          transaction.set(newWdRef, {
            type: 'withdrawal',
            id: newWdRef.id,
            userId: u.id,
            username: snap.data().username || 'User',
            amount: Math.abs(adjustAmount),
            status: adjustAmount > 0 ? 'deposit' : 'rejected',
            createdAt: new Date().toISOString()
          });
        });
        showToast('แก้ไขข้อมูลการปรับปรุงเครดิตบัญชีเรียบร้อย');
        closeModal();
        debouncedRenderAdminTab();
      } catch (err) {
        showToast('ล้มเหลวในการปรับปรุงเครดิตสมาชิก', 'error');
      }
    }

    async function saveAdminUser(bid) {
      const u = adminUsersData.find(d => d.__backendId === bid);
      if (!u) return showToast('ไม่พบข้อมูลบัญชีผู้ใช้ในระบบ', 'error');

      let userDocRef = doc(db, "users", u.id);

      const btn = $('btn-save-user');
      if (btn) {
        btn.disabled = true;
        btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> <span>กำลังบันทึก...</span>`;
        safeCreateIcons();
      }

      try {
        const enteredPass = $('eu-pass').value.trim();
        const enteredPin = $('eu-pin').value.trim();

        const isSha265 = (str) => /^[a-f0-9]{64}$/i.test(str);
        const targetPassword = isSha265(enteredPass) ? enteredPass : await hashValue(enteredPass);
        const targetPin = isSha265(enteredPin) ? enteredPin : await hashValue(enteredPin);

        await runTransaction(db, async (transaction) => {
          const updatePayload = {
            phone: $('eu-phone').value.trim(),
            password: targetPassword,
            withdrawPassword: targetPin,
            userLevel: $('eu-level').value
          };
          transaction.update(userDocRef, updatePayload);
        });
        showToast('อัปเดตข้อมูลบัญชีผู้ใช้งานสำเร็จ');
        closeModal();
        debouncedRenderAdminTab();
      } catch (err) {
        showToast('เกิดข้อผิดพลาดในการเขียนข้อมูลของระบบ', 'error');
        if (btn) {
          btn.disabled = false;
          btn.innerHTML = `<span>บันทึกข้อมูลส่วนตัว</span>`;
        }
      }
    }

    async function deleteAdminUser(bid) { 
      const u = adminUsersData.find(d => d.__backendId === bid); 
      if(!u) return showToast('ไม่พบข้อมูลบัญชีผู้ใช้งานที่จะลบในสารบบ', 'error');

      const result = await Swal.fire({
        title: '🚨 ยืนยันการลบบัญชีผู้ใช้ถาวร?',
        text: 'คำเตือน: ประวัติการเงิน (ฝาก-ถอน), ประวัติการทำภารกิจสินค้า และคิวล็อกออเดอร์พิเศษทั้งหมดของสมาชิกรายนี้จะถูกล้างออกโดยอัตโนมัติ!',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ef4444',
        cancelButtonColor: '#404040',
        confirmButtonText: 'ยืนยัน, ลบข้อมูลทั้งหมดถาวร',
        cancelButtonText: 'ยกเลิก',
        background: '#ffffff',
        color: '#0f172a'
      });

      if (result.isConfirmed) {
        Swal.fire({
          title: 'กำลังล้างทำลายข้อมูลในระบบ...',
          allowOutsideClick: false,
          didOpen: () => { Swal.showLoading(); }
        });

        try {
          const batch = writeBatch(db);

          const qOrders = query(collection(db, "orders"), where("userId", "==", bid));
          const snapOrders = await getDocs(qOrders);
          snapOrders.forEach(docSnap => {
            batch.delete(doc(db, "orders", docSnap.id));
          });

          const qWds = query(collection(db, "withdrawals"), where("userId", "==", bid));
          const snapWds = await getDocs(qWds);
          snapWds.forEach(docSnap => {
            batch.delete(doc(db, "withdrawals", docSnap.id));
          });

          const qSpecial = query(collection(db, "special_assignments"), where("targetUser", "==", bid));
          const snapSpecial = await getDocs(qSpecial);
          snapSpecial.forEach(docSnap => {
            batch.delete(doc(db, "special_assignments", docSnap.id));
          });

          batch.delete(doc(db, "users", bid));

          await batch.commit();

          Swal.close();
          closeModal(); 
          showToast('บัญชีสมาชิกดังกล่าวรวมถึงประวัติการเงินและสินค้าถูกทำลายหมดจดแล้ว');
          debouncedRenderAdminTab();
        } catch (e) {
          Swal.close();
          showToast('เกิดข้อผิดพลาดในการล้างข้อมูล: ' + e.message, 'error');
        }
      } 
    }

    async function doEditProduct(bid) {

    function filterAssignUsers(queryVal) {
      const select = $('sa-user'); if(!select) return;
      const q = queryVal.toLowerCase().trim();
      select.innerHTML = adminUsersData
        .filter(u => {
          const username = u.username || '';
          return username.toLowerCase().includes(q) || u.phone.includes(q);
        })
        .map(u => {
          const username = u.username || 'User';
          return `<option value="${u.id}">${username} (${u.phone})</option>`;
        })
        .join('');
    }

    async function doAssignSWithEdit(imgUrl) {
      const name = $('sa-name').value.trim();
      const price = parseFloat($('sa-price').value) || 0;
      const comm = parseFloat($('sa-comm').value) || 0;
      const targetUser = $('sa-user').value;
      const targetIndex = parseInt($('sa-idx').value) || 1;

      if (btn) {
        btn.disabled = true;
        btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> <span>กำลังบันทึก...</span>`;
        safeCreateIcons();
      }
      
      try {
        await windowDataSdk.create({
          type: 'special_assignments', id: genId(), productName: name,
          productPrice: price, commission: comm, productImage: imgUrl,
          targetUser: targetUser, targetIndex: targetIndex, createdAt: new Date().toISOString()

        showToast('ระบบเครือข่ายผิดพลาด: ' + err.message, 'error');
        if (btn) {
          btn.disabled = false;
          btn.innerHTML = `<span>ติดตั้งออเดอร์ล็อกคิว</span>`;
        }
      }
    }

      const s = adminSpecialAssignData.find(d => d.__backendId === bid); 
      if(!s) return showToast('ไม่พบข้อมูลล็อกออเดอร์ในฐานข้อมูลเพื่อบันทึกทับ', 'error');

      const name = $('sa-edit-name').value.trim();
      const price = parseFloat($('sa-edit-price').value) || 0;
      const comm = parseFloat($('sa-edit-comm').value) || 0;
      const targetUser = $('sa-edit-user').value;
      const targetIndex = parseInt($('sa-edit-idx').value) || 1;
      if (!name) return showToast('กรุณาระบุชื่อสินค้า', 'error');
      if (!targetUser) return showToast('กรุณาระบุสมาชิกรับงานปลายทาง', 'error');

      const btn = $('btn-edit-assign');
      if (btn) {
        btn.disabled = true;
        btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> <span>กำลังบันทึก...</span>`;
        safeCreateIcons();
      }
      
      try {
        await windowDataSdk.update({
          ...s, productName: name, productPrice: price, commission: comm,
          productImage: imgUrl, targetUser: targetUser, targetIndex: targetIndex
        });
        closeModal();
        debouncedRenderAdminTab();
        showToast('ปรับปรุงอัปเดตออเดอร์พิเศษสำเร็จ');

    window.viewSlipImage = (src) => {

    async function approveWithdraw(bid) { 
      const w = adminWithdrawalsData.find(d => d.__backendId === bid); 
      if(!w) return showToast('ไม่พบประวัติใบถอนเงินดังกล่าว', 'error');
      
      const wdDocRef = doc(db, "withdrawals", bid);
      try {
        await runTransaction(db, async (transaction) => {
          const wdSnap = await transaction.get(wdDocRef);
          if (!wdSnap.exists() || wdSnap.data().status !== 'pending') {
            throw "ธุรกรรมนี้ไม่ได้อยู่ในสถานะรอดำเนินการ";
          }
          transaction.update(wdDocRef, { status: 'approved' });
        });
        showToast('อนุมัติบิลถอนเงินสำเร็จ');
        debouncedRenderAdminTab(); 
        safeCreateIcons();
      } catch (err) {
        showToast('อนุมัติล้มเหลว: ' + err, 'error');
      }
    }
    
    async function rejectWithdraw(bid) { 
      const w = adminWithdrawalsData.find(d => d.__backendId === bid); 
      if(!w) return showToast('ไม่พบข้อมูลประวัติทำรายการดังกล่าว', 'error');
      let userDocRef = doc(db, "users", w.userId);
      const wdDocRef = doc(db, "withdrawals", bid);

      try {
        await runTransaction(db, async (transaction) => {
          const wdSnap = await transaction.get(wdDocRef);
          if (!wdSnap.exists() || wdSnap.data().status !== 'pending') {
            throw "ธุรกรรมนี้ไม่ได้อยู่ในสถานะรอดำเนินการ";
          }
          const uSnap = await transaction.get(userDocRef);
          if (uSnap.exists()) {
            const currentCredit = uSnap.data().credit || 0;
            const refundedVal = currentCredit + (w.amount || 0);
            transaction.update(userDocRef, { credit: refundedVal });
          }
          transaction.update(wdDocRef, { status: 'rejected' });
        });
        showToast('ปฏิเสธการถอนเงินเรียบร้อย ยอดเครดิตคืนเข้าพอร์ตสมาชิกแล้ว');
        debouncedRenderAdminTab();
        safeCreateIcons();
      } catch (err) {
        showToast('การส่งผ่านข้อมูลธุรกรรมล้มเหลว: ' + err, 'error');
      }
    }

    async function approveDeposit(bid) {
      const w = adminWithdrawalsData.find(d => d.__backendId === bid);
      if(!w) return showToast('ไม่พบสลิปใบโอนเงินปลายทาง', 'error');
      let userDocRef = doc(db, "users", w.userId);
      const wdDocRef = doc(db, "withdrawals", bid);

      try {
        await runTransaction(db, async (transaction) => {
          const wdSnap = await transaction.get(wdDocRef);
          if (!wdSnap.exists() || wdSnap.data().status !== 'deposit_pending') {
            throw "ธุรกรรมนี้ไม่ได้อยู่ในสถานะรอตรวจสอบสลิป";
          }
          const uSnap = await transaction.get(userDocRef);
          if (uSnap.exists()) {
            const currentCredit = uSnap.data().credit || 0;
            const addedVal = currentCredit + (w.amount || 0);
            transaction.update(userDocRef, { credit: addedVal });
          }
          transaction.update(wdDocRef, { status: 'deposit' });
        });
        showToast('อนุมัติยอดฝากและเติมเงินเข้าพอร์ตผู้ใช้สำเร็จ!');
        debouncedRenderAdminTab();
        safeCreateIcons();
      } catch (err) {
        showToast('เกิดข้อผิดพลาดในการประมวลผลธุรกรรม: ' + err, 'error');
      }
    }

    async function rejectDeposit(bid) {
      const w = adminWithdrawalsData.find(d => d.__backendId === bid);
      if(!w) return showToast('ไม่พบข้อมูลคำขอเติมเงินดังกล่าว', 'error');
      
      const wdDocRef = doc(db, "withdrawals", bid);
      try {
        await runTransaction(db, async (transaction) => {
          const wdSnap = await transaction.get(wdDocRef);
          if (!wdSnap.exists() || wdSnap.data().status !== 'deposit_pending') {
            throw "ธุรกรรมนี้ไม่ได้อยู่ในสถานะรอตรวจสอบสลิป";
          }
          transaction.update(wdDocRef, { status: 'rejected' });
        });
        showToast('ปฏิเสธสลิปแจ้งยอดฝากเรียบร้อย');
        debouncedRenderAdminTab();
        safeCreateIcons();
      } catch (err) {
        showToast('ปฏิเสธสลิปล้มเหลว: ' + err, 'error');
      }
    }

    async function deleteWithdrawal(bid) {
      const withdrawalObj = adminWithdrawalsData.find(d => d.__backendId === bid);
      if (!withdrawalObj) return showToast('ไม่พบข้อมูลธุรกรรมดังกล่าวในระบบ หรือข้อมูลถูกลบไปก่อนหน้าแล้ว', 'error');

      const result = await Swal.fire({
        title: 'คุณต้องการลบประวัติธุรกรรมนี้?',
        text: 'ประวัติทางการเงินชิ้นนี้จะถูกถอนออกจากระบบหลังบ้านถาวร',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ef4444',
        cancelButtonColor: '#404040',
        confirmButtonText: 'ลบ',
        cancelButtonText: 'ยกเลิก',
        background: '#ffffff',
        color: '#0f172a'
      });

      if (result.isConfirmed) {
        try {
          await windowDataSdk.delete(withdrawalObj);
          showToast('ทำลายข้อมูลบิลเรียบร้อย');
          debouncedRenderAdminTab();
          safeCreateIcons();
        } catch (err) {
          showToast('ความผิดพลาดจากฝั่งเครื่องแม่ข่าย: ' + err.message, 'error');
        }
      }
    }

    async function doAddShowcaseProduct() {
      const orderVal = parseInt($('asp-order').value) || 1;
      const nameVal = $('asp-name').value.trim();
      const priceVal = $('asp-price').value.trim();
      const imageVal = $('asp-image').value.trim();
      const discountVal = $('asp-discount').value.trim();
      const originalPriceVal = $('asp-original').value.trim();

      if (!nameVal || !priceVal || !imageVal) return showToast('กรุณาระบุข้อมูลจำเป็นให้ครบถ้วน', 'error');

      const btn = $('btn-submit-showcase');
      if (btn) { btn.disabled = true; btn.textContent = 'กำลังดำเนินการ...'; }

      try {
        await windowDataSdk.create({
          type: 'showcase_product',
          id: genId(),
          order: orderVal,
          productName: nameVal,
          price: priceVal,
          image: imageVal,
          discount: discountVal,
          originalPrice: originalPriceVal

        showToast('บันทึกรูปสินค้าโชว์หน้าหลักสำเร็จ');
        closeModal();
        debouncedRenderAdminTab();

        showToast('เกิดข้อผิดพลาด: ' + err.message, 'error');
      }
    }

      const result = await Swal.fire({
        title: 'คุณต้องการลบรายการสินค้านี้จากหน้าหลัก?',
        text: 'รูปโชว์สินค้าแนะนำดังกล่าวจะถูกยกเลิกการแสดงผลหน้าบ้านของผู้ใช้งานทันที',

    window.toggleSettingsSection = (secId, btn) => {
      const el = $(secId); if(!el) return;
      const icon = btn ? btn.querySelector('i') : null;
      if (el.classList.contains('hidden')) {
        el.classList.remove('hidden');
        if (icon) {
          icon.style.transform = 'rotate(90deg)';
        }
      } else {
        el.classList.add('hidden');
        if (icon) {
          icon.style.transform = 'rotate(0deg)';
        }
      }
    };

    async function saveAdminSettings(type) {
      let config = getConfig() || {};
      const updatePayload = { 
        ...config,
        type: 'config',
        id: 'system_config'
      };

      if (type === 'logo_invite') {
        updatePayload.logoUrl = $('cfg-logo').value.trim();
        updatePayload.inviteCode = $('cfg-invite').value.trim();
      }
      else if (type === 'bgs') { 
        updatePayload.loginBgUrl = $('cfg-login-bg').value.trim(); 
        updatePayload.loginBgUrlMobile = $('cfg-login-bg-mobile').value.trim(); 
        updatePayload.userBgUrl = $('cfg-user-bg').value.trim(); 
        updatePayload.userBgUrlMobile = $('cfg-user-bg-mobile').value.trim(); 
      }
      else if (type === 'marquee') {
        updatePayload.marqueeText = $('cfg-marquee').value.trim();
        updatePayload.scheduleText = $('cfg-schedule').value.trim();
      }
      else if (type === 'line') { 
        updatePayload.lineQrUrl = $('cfg-line-qr').value.trim(); 
        updatePayload.lineId = $('cfg-line-id').value.trim(); 
      }
      else if (type === 'topup_banks') { 
        updatePayload.topupQrUrl = $('cfg-topup-qr').value.trim(); 
        updatePayload.topupAccount = $('cfg-topup-acc').value.trim(); 
        updatePayload.supportedBanks = $('cfg-banks').value.trim();
        updatePayload.rewardsList = $('cfg-rewards-list').value.trim();
      }
      else if (type === 'tab_config') { 
        updatePayload.tabTitle = $('cfg-tab-title').value.trim(); 
        updatePayload.tabFaviconUrl = $('cfg-tab-favicon').value.trim(); 
      }
      else if (type === 'theme_colors') {
        updatePayload.themePrimary = $('cfg-theme-primary-txt').value.trim().toLowerCase();
        updatePayload.themeSecondary = $('cfg-theme-secondary-txt').value.trim().toLowerCase();
        updatePayload.themeMarqueeBg = $('cfg-theme-marquee-bg-txt').value.trim().toLowerCase();
        updatePayload.themeType = $('cfg-theme-type').value;
      }

      publicData.configs = [updatePayload];
      localStorage.setItem('tos_cached_config', JSON.stringify(updatePayload));
      try {
        await saveConfigToFirebase(updatePayload); 
        showToast('บันทึกปรับปรุงแก้ไขการตั้งค่าสำเร็จ', 'success'); 
        debouncedRenderAdminTab();
      } catch (err) {
        console.error("Save config failed: ", err);
        showToast("ล้มเหลวในการบันทึกข้อมูล: " + err.message, "error");
      }
    }

    function showAddMenuIcon() { showModal(`<h3 class="font-semibold text-sm mb-4 text-sky-500 border-b border-slate-200 pb-2 font-sans uppercase tracking-wider">ลงทะเบียนเพิ่มคู่มือผู้ใช้</h3><input id="mi-label" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 text-slate-800 rounded mb-3 text-sm font-sans" placeholder="ระบุหัวข้อหัวข้อย่อยคู่มือ"><input id="mi-url" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 text-slate-800 rounded mb-3 text-sm font-sans" placeholder="ที่อยู่ไฟล์รูปภาพไอคอน URL (ถ้ามี)"><textarea id="mi-content" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 text-slate-800 rounded h-28 mb-4 text-sm font-sans" placeholder="รายละเอียดเนื้อความคำแนะนำแนะนำ..."></textarea><button id="btn-submit-menu-icon" onclick="doAddMenuIcon()" class="w-full py-2.5 bg-sky-600 hover:bg-sky-500 text-white font-semibold rounded transition text-sm uppercase tracking-wider font-sans shadow-sm">ส่งพอร์ตบันทึกข้อมูล</button>`); }
    function editMenuIcon(bid) {

      if (!m) return showToast('ไม่พบข้อมูลเมนูช่วยเหลือที่ต้องการแก้ไข', 'error');

      showModal(`<h3 class="font-semibold text-sm mb-4 text-sky-500 border-b border-slate-200 pb-2 font-sans uppercase tracking-wider">แก้ไขรายละเอียดหัวข้อแนะนำระบบ</h3><input id="mi-label" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 text-slate-800 rounded mb-3 text-sm font-semibold font-sans" value="${m.menuLabel}"><input id="mi-url" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 text-slate-800 rounded mb-3 text-sm font-sans" value="${m.menuIconUrl||''}"><textarea id="mi-content" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 text-slate-800 rounded h-28 mb-4 text-sm font-sans">${m.menuContent||''}</textarea><button id="btn-edit-menu-icon" onclick="doEditMenuIcon('${bid}')" class="w-full py-2.5 bg-sky-600 hover:bg-sky-500 text-white font-semibold rounded transition text-sm uppercase tracking-wider font-sans shadow-sm">อัปเดตและบันทึกข้อมูล</button>`); 
    }
    function doAddMenuIcon() { 
      const btn = $('btn-submit-menu-icon');
      if (btn) { btn.disabled = true; btn.textContent = 'กำลังดำเนินการ...'; }
      try {
        windowDataSdk.create({ type:'menuIcon', id:genId(), menuLabel: $('mi-label').value.trim(), menuContent: $('mi-content').value.trim(), menuIconUrl: $('mi-url').value.trim() }); 
        closeModal(); 
        debouncedRenderAdminTab(); 
      } catch (err) {
        if (btn) { btn.disabled = false; btn.textContent = 'ส่งพอร์ตบันทึกข้อมูล'; }
        showToast('เกิดข้อผิดพลาด: ' + err.message, 'error');
      }
    }
    function doEditMenuIcon(bid) { 
      const m = publicData.menuIcons.find(d => d.__backendId === bid); 
      if (!m) return showToast('ไม่พบข้อมูลเมนูเป้าหมายเพื่อเขียนทับค่าสะสม', 'error');

      const btn = $('btn-edit-menu-icon');

        windowDataSdk.update({ ...m, menuLabel: $('mi-label').value.trim(), menuContent: $('mi-content').value.trim(), menuIconUrl: $('mi-url').value.trim() });

        debouncedRenderAdminTab();

        if (btn) { btn.disabled = false; btn.textContent = 'อัปเดตและบันทึกข้อมูล'; }
        showToast('เกิดข้อผิดพลาด: ' + err.message, 'error');
      }
    }
    async function deleteMenuIcon(bid) { 
      const targetMenu = publicData.menuIcons.find(d => d.__backendId === bid);
      if (!targetMenu) return showToast('ไม่พบข้อมูลเมนูเป้าหมายในระบบหรืออาจถูกลบไปแล้ว', 'error');

      const result = await Swal.fire({
        title: 'ยืนยันการลบคู่มือแนะนำนี้?',
        text: 'ไอเทมนี้จะถูกถอนออกจากกล่องคู่มือ 4 ไอคอนส่วนหน้าหลักผู้ใช้งาน',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ef4444',
        cancelButtonColor: '#404040',
        confirmButtonText: 'ลบออก',
        cancelButtonText: 'ยกเลิก',
        background: '#ffffff',
        color: '#0f172a'
      });

      if (result.isConfirmed) {
        await windowDataSdk.delete(targetMenu); 
        debouncedRenderAdminTab(); 
      }
    }

    document.addEventListener('input', (e) => {

      if (e.target.id === 'cfg-theme-secondary-txt') {
        const picker = $('cfg-theme-secondary');

      }
    });

    document.addEventListener('change', (e) => {
      if (e.target.id === 'cfg-theme-primary') {
